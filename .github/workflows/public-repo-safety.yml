name: Public Repo Safety

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  safety:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scan tracked files for secrets and personal data
        run: python3 scripts/check_public_repo_safety.py
